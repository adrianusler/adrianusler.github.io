- title: Electrochemical Impedance Spectroscopy
  id: impedance
  figure: /figures/schematic_nyquist_four_features_1.png
  abstract: Impedance spectroscopy is an electrical measurement technique in which electrochemical systems are subjected to an oscillating stimulus, and the resulting response is measured. Different electrochemical processes (e.g., charge transfer, diffusion, and double-layer charging) can be distinguished by their characteristic time scales. The interpretation of impedance spectra requires detailed physical understanding of the involved processes. In my work, I use simulations to help interpret impedance spectra of electrochemical systems, with a focus on double layers in liquid electrolytes and space-charge layers in solid electrolytes.

- title: Grain-boundary space-charge layers in ion-conducting solids
  id: gb-space-charge
  figure: /figures/RE_illustration.png
  abstract: The electrical resistance of many ion-conducting oxides (useful e.g. as solid electrolytes in fuel cells) is largely determined by the presence of space charge at the grain boundaries. With formulas from simplified models, one can estimate from electrical measurements the electric potential difference between the grain boundary and the grain bulk, called the space-charge potential. In my research, I have studied the validity of such estimates. Notably, the underlying models do not account for a sample's thermal history. During sample fabrication (sintering), the grain-boundary defect chemistry can undergo irreversible changes which are typically disregarded in the analysis of electrical data.
